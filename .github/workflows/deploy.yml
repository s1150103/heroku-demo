name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ===========================
  # CI: テスト & ビルド
  # ===========================
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      # 1. コードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 21をセットアップ
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. Mavenキャッシュ（ビルドを高速化）
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # 4. mvnwに実行権限を付与
      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      # 5. テスト実行（DB不要のテストのみ）
      - name: Run tests
        run: ./mvnw test -Dspring.datasource.url=jdbc:h2:mem:testdb -Dspring.datasource.driver-class-name=org.h2.Driver -Dspring.datasource.username=sa -Dspring.datasource.password= -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect

      # 6. ビルド
      - name: Build with Maven
        run: ./mvnw clean package -DskipTests

  # ===========================
  # CD: Herokuへデプロイ
  # ===========================
  deploy:
    name: Deploy to Heroku
    runs-on: ubuntu-latest
    needs: test  # testジョブが成功したらデプロイ
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      # 1. コードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴を取得（Herokuデプロイに必要）

      # 2. Herokuにデプロイ（git push方式）
      - name: Deploy to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          git remote add heroku https://heroku:$HEROKU_API_KEY@git.heroku.com/${{ secrets.HEROKU_APP_NAME }}.git
          git push heroku master --force
